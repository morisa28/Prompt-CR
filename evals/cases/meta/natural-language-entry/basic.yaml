id: meta.natural_language_entry.basic
branch: meta/natural-language-entry
title: Natural language request becomes routed final prompt
category: meta
user_request: "帮我写一个 prompt，让 Codex 修复 npm run build 报错，但不要乱改项目。"
expected_primary_branch: bugfix-debugging
expected_auxiliary_branches:
  - test-generation
  - cli-agent
expected_resources:
  - "@branch://software-engineering/bugfix-debugging"
  - "@template://coding-agent/bugfix"
  - "@adapter://codex"
  - "@checklist://natural-language-entry"
  - "@eval://software-engineering/bugfix-debugging/missing-inputs"
required_missing_inputs:
  - working_directory
  - error_log
  - reproduction_steps
  - environment
risk_level: medium
expected_prompt_features:
  - normalizes the user request into final deliverable
  - selects primary and auxiliary branches
  - selects registry resources
  - marks missing inputs
  - outputs a final prompt and self-check
forbidden_prompt_features:
  - requires the user to know directory structure first
  - routes to generic coding without bugfix constraints
  - allows unrelated refactor
acceptance_criteria:
  - generated route includes resources and missing inputs
  - final prompt is executable by Codex
  - self-check references expected and forbidden features
related_lessons:
  - "@lesson://routing/ambiguous-bugfix-request"
notes: "This is the core natural-language entry behavior test."
