version: 2
description: "CodePrompt Coach MVP branch manifest for software engineering prompt clarification and generation."

branches:
  - id: software-engineering.bugfix-debugging
    title: Bugfix & Debugging
    category: software-engineering
    path: branches/software-engineering/bugfix-debugging.md
    purpose: Fix or diagnose software failures with root-cause analysis, minimal safe changes, and verification.
    primary_triggers: [error log, failing test, build failure, runtime exception, CLI error]
    negative_triggers: [new feature from scratch, broad architecture rewrite, read-only repo analysis]
    required_inputs: [working_directory, error_log, reproduction_steps, environment, expected_behavior, actual_behavior]
    optional_inputs: [recent_changes, related_files, verification_commands]
    compatible_auxiliary_branches: [software-engineering.test-generation, software-engineering.cli-agent, software-engineering.repository-analysis]
    risk_level_default: medium
    output_sections: [root_cause, evidence, changed_files, key_changes, verification_commands, remaining_risks]
    eval_cases:
      - evals/cases/software-engineering/bugfix-debugging/basic.yaml
      - evals/cases/software-engineering/bugfix-debugging/missing-inputs.yaml
      - evals/cases/software-engineering/bugfix-debugging/unsafe-shortcut.yaml

  - id: software-engineering.coding-feature-development
    title: Coding Feature Development
    category: software-engineering
    path: branches/software-engineering/coding-feature-development.md
    purpose: Convert feature goals into executable coding-agent prompts.
    primary_triggers: [new feature, UI component, API implementation, interaction logic]
    negative_triggers: [specific error log, read-only analysis, pure review]
    required_inputs: [working_directory, feature_goal, user_flow, acceptance_criteria, modification_scope, verification_steps]
    optional_inputs: [tech_stack, related_files, design_assets, api_contract, non_goals]
    compatible_auxiliary_branches: [software-engineering.test-generation, software-engineering.cli-agent, software-engineering.api-design]
    risk_level_default: medium
    output_sections: [implementation_plan, changed_files, key_logic, user_flow_coverage, verification, risks]
    eval_cases:
      - evals/cases/software-engineering/coding-feature-development/basic.yaml
      - evals/cases/software-engineering/coding-feature-development/missing-acceptance.yaml
      - evals/cases/software-engineering/coding-feature-development/scope-creep-risk.yaml

  - id: software-engineering.refactor-architecture
    title: Refactor Architecture
    category: software-engineering
    path: branches/software-engineering/refactor-architecture.md
    purpose: Improve structure while preserving external behavior.
    primary_triggers: [refactor, architecture cleanup, module split, reduce coupling]
    negative_triggers: [new behavior, specific error log, read-only analysis]
    required_inputs: [working_directory, refactor_goal, behavior_to_preserve, allowed_scope, regression_tests]
    optional_inputs: [risk_focus, rollout_plan]
    compatible_auxiliary_branches: [software-engineering.test-generation, software-engineering.repository-analysis]
    risk_level_default: medium
    output_sections: [scope_table, refactor_plan, behavior_preservation, regression_tests, risks]
    eval_cases: []

  - id: software-engineering.test-generation
    title: Test Generation
    category: software-engineering
    path: branches/software-engineering/test-generation.md
    purpose: Generate runnable behavior-focused tests.
    primary_triggers: [write tests, coverage, regression tests, e2e tests]
    negative_triggers: [delete tests, only fix bug, implementation from scratch]
    required_inputs: [working_directory, test_target, behaviors, test_level, test_framework, test_command]
    optional_inputs: [fixtures, coverage_goal, existing_tests, edge_cases]
    compatible_auxiliary_branches: [software-engineering.bugfix-debugging, software-engineering.coding-feature-development]
    risk_level_default: medium
    output_sections: [test_strategy, coverage_table, test_files, fixtures, command_results, uncovered_cases]
    eval_cases:
      - evals/cases/software-engineering/test-generation/basic.yaml
      - evals/cases/software-engineering/test-generation/missing-framework.yaml
      - evals/cases/software-engineering/test-generation/surface-tests-risk.yaml

  - id: software-engineering.code-review
    title: Code Review
    category: software-engineering
    path: branches/software-engineering/code-review.md
    purpose: Produce location-specific review findings ordered by severity.
    primary_triggers: [code review, review PR, inspect diff, find bugs]
    negative_triggers: [direct implementation, pure repository onboarding]
    required_inputs: [working_directory, review_scope, diff_or_files, review_focus]
    optional_inputs: [severity_scale, test_commands]
    compatible_auxiliary_branches: [software-engineering.test-generation, software-engineering.security-threat-modeling]
    risk_level_default: medium
    output_sections: [findings, open_questions, test_gaps, summary]
    eval_cases: []

  - id: software-engineering.repository-analysis
    title: Repository Analysis
    category: software-engineering
    path: branches/software-engineering/repository-analysis.md
    purpose: Produce a read-only project understanding report with evidence.
    primary_triggers: [analyze repo, understand codebase, project structure, entry points]
    negative_triggers: [fix bug, implement feature, edit files]
    required_inputs: [working_directory, analysis_goal, focus_areas, output_depth]
    optional_inputs: [excluded_paths, known_questions, report_audience, time_budget]
    compatible_auxiliary_branches: [software-engineering.cli-agent]
    risk_level_default: medium
    output_sections: [overview, read_scope, file_tree, tech_stack_evidence, modules, data_flow, risks, recommendations]
    eval_cases:
      - evals/cases/software-engineering/repository-analysis/basic.yaml
      - evals/cases/software-engineering/repository-analysis/missing-scope.yaml
      - evals/cases/software-engineering/repository-analysis/no-edit-boundary.yaml

  - id: software-engineering.api-design
    title: API Design
    category: software-engineering
    path: branches/software-engineering/api-design.md
    purpose: Design API contracts, auth, errors, pagination, examples, and test scenarios.
    primary_triggers: [REST API, GraphQL, gRPC, OpenAPI, endpoint, request response]
    negative_triggers: [pure implementation without contract, marketing content]
    required_inputs: [api_goal, api_style, consumer, resource_model, auth_method, request_fields, response_fields, error_cases]
    optional_inputs: [versioning_requirement, rate_limit_requirement, openapi_required]
    compatible_auxiliary_branches: [software-engineering.coding-feature-development, software-engineering.test-generation]
    risk_level_default: medium
    output_sections: [api_goal, resources, schemas, auth, errors, examples, tests]
    eval_cases: []

  - id: software-engineering.database-migration
    title: Database Migration
    category: software-engineering
    path: branches/software-engineering/database-migration.md
    purpose: Plan schema/data migrations with backup, rollback, compatibility, and staging validation.
    primary_triggers: [database migration, schema change, ORM migration, rollback, backfill]
    negative_triggers: [no database change, pure API design]
    required_inputs: [database_type, migration_tool, current_schema, target_schema, backup_status, rollback_plan]
    optional_inputs: [data_volume, affected_tables, affected_services, downtime_tolerance]
    compatible_auxiliary_branches: [software-engineering.test-generation, software-engineering.devops-ci]
    risk_level_default: medium
    output_sections: [schema_summary, destructive_changes, migration_plan, rollback, validation, risks]
    eval_cases: []

  - id: software-engineering.devops-ci
    title: DevOps CI
    category: software-engineering
    path: branches/software-engineering/devops-ci.md
    purpose: Handle CI/CD, builds, deployment, runner, secrets, cache, and rollback prompts.
    primary_triggers: [CI, CD, GitHub Actions, Docker build, deploy failed, runner]
    negative_triggers: [local code bug only, no pipeline context]
    required_inputs: [repository_path, ci_platform, deployment_target, build_command, test_command, current_error_log]
    optional_inputs: [environment_variables, branch_strategy, rollback_requirement]
    compatible_auxiliary_branches: [software-engineering.bugfix-debugging, software-engineering.test-generation]
    risk_level_default: medium
    output_sections: [ci_status, evidence, changed_files, secrets_handling, validation, rollback, risks]
    eval_cases: []

  - id: software-engineering.security-threat-modeling
    title: Security Threat Modeling
    category: software-engineering
    path: branches/software-engineering/security-threat-modeling.md
    purpose: Generate defensive security review and threat modeling prompts.
    primary_triggers: [security review, threat model, auth audit, data leakage, permission]
    negative_triggers: [attack payload, exploit chain, bypass, persistence]
    required_inputs: [system_scope, assets, actors, trust_boundaries, entry_points, authorization_status]
    optional_inputs: [security_controls, compliance_requirements, logging_audit]
    compatible_auxiliary_branches: [software-engineering.code-review, software-engineering.api-design]
    risk_level_default: medium
    output_sections: [scope, assets, boundaries, risks, mitigations, validation]
    eval_cases: []

  - id: software-engineering.algorithm-problem-solving
    title: Algorithm Problem Solving
    category: software-engineering
    path: branches/software-engineering/algorithm-problem-solving.md
    purpose: Clarify algorithm tasks with input/output, constraints, complexity, edge cases, and verification.
    primary_triggers: [algorithm, data structure, coding interview, complexity, edge cases]
    negative_triggers: [repository modification, UI implementation]
    required_inputs: [problem_statement, input_format, output_format, constraints, examples, target_language]
    optional_inputs: [verification_cases, proof_style]
    compatible_auxiliary_branches: [software-engineering.test-generation]
    risk_level_default: low
    output_sections: [problem_restatement, constraints, algorithm, proof, complexity, code, tests, risks]
    eval_cases: []

  - id: software-engineering.cli-agent
    title: CLI Agent
    category: software-engineering
    path: branches/software-engineering/cli-agent.md
    purpose: Add command-line execution, permissions, command failure handling, and report boundaries.
    primary_triggers: [Codex CLI, Claude Code, Gemini CLI, command line agent]
    negative_triggers: [no command execution]
    required_inputs: [cli_tool, working_directory, allowed_commands, forbidden_actions, network_policy]
    optional_inputs: [approval_policy, report_format]
    compatible_auxiliary_branches: [software-engineering.bugfix-debugging, software-engineering.coding-feature-development]
    risk_level_default: medium
    output_sections: [task, command_plan, permission_boundary, failure_handling, final_report]
    eval_cases: []

  - id: software-engineering.plan-mode
    title: Plan Mode
    category: software-engineering
    path: branches/software-engineering/plan-mode.md
    purpose: Read, analyze, and plan before file modification.
    primary_triggers: [plan first, no edits, large refactor, high risk change]
    negative_triggers: [simple direct edit]
    required_inputs: [working_directory, task_goal, read_first, risk_focus]
    optional_inputs: [verification_steps, expected_files]
    compatible_auxiliary_branches: [software-engineering.repository-analysis]
    risk_level_default: medium
    output_sections: [task_understanding, read_files, current_state, risks, staged_plan, verification]
    eval_cases: []
