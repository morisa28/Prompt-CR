id: data.analysis.visualization_report
branch: data-analytics/data-analysis
title: Data analysis with visualization report
category: data-analytics
user_request: "分析用户留存下降原因，并输出图表和管理层报告。"
expected_primary_branch: data-analysis
expected_auxiliary_branches:
  - visualization-dashboard
  - report-writing
expected_resources:
  - "@branch://data-analytics/data-analysis"
  - "@template://data-analysis/reproducible-report"
  - "@checklist://data-analysis"
required_missing_inputs:
  - data_source
  - retention_definition
  - field_definitions
  - report_audience
risk_level: medium
expected_prompt_features:
  - defines retention metric and segmentation dimensions
  - requires data quality checks
  - includes chart recommendations matched to data types
  - includes report structure and limitations
forbidden_prompt_features:
  - creates decorative charts without metric purpose
  - skips data cleaning rules
  - states causal conclusion without experiment or evidence
acceptance_criteria:
  - generated prompt supports reproducible analysis and report output
  - generated prompt includes visualization and uncertainty boundaries
related_lessons:
  - "@lesson://prompt-failures/data-analysis-missing-dictionary"
notes: "Tests analysis + visualization + report composition."
