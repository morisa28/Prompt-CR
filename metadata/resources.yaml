version: 2
description: "CodePrompt Coach resource registry focused on software engineering prompt clarification, scoring, generation, review, and lessons."

uri_rules:
  format: "@<type>://<category>/<slug>"
  examples:
    - "@branch://software-engineering/bugfix-debugging"
    - "@template://codeprompt-coach/coding-agent-task"
    - "@checklist://codeprompt-coach/final-review"
    - "@eval://software-engineering/bugfix-debugging/basic"
    - "@adapter://codex"
    - "@lesson://prompt-failures/bugfix-missing-verification"

resource_types:
  - branch
  - template
  - checklist
  - example
  - eval
  - adapter
  - lesson

selection_policy:
  mvp_scope:
    - Select one software engineering scenario by final deliverable.
    - Use Level 0 to Level 4 clarification before generation.
    - Score before and after prompt generation.
    - Record low-score dimensions as PromptMistake records.
    - Do not route MVP requests into archived non-software domains.

resources:
  branches:
    - id: branch:software-engineering.bugfix-debugging
      uri: "@branch://software-engineering/bugfix-debugging"
      path: branches/software-engineering/bugfix-debugging.md
      category: software-engineering
      purpose: "Bugfix prompt generation with logs, reproduction, root cause, minimal change, and verification."
      linked_templates:
        - "@template://codeprompt-coach/bugfix"
      linked_checklists:
        - "@checklist://codeprompt-coach/bugfix"
        - "@checklist://codeprompt-coach/final-review"
      linked_evals:
        - "@eval://software-engineering/bugfix-debugging/basic"
        - "@eval://software-engineering/bugfix-debugging/missing-inputs"
        - "@eval://software-engineering/bugfix-debugging/unsafe-shortcut"
      linked_lessons:
        - "@lesson://routing/ambiguous-bugfix-request"
        - "@lesson://prompt-failures/bugfix-missing-verification"
      compatible_adapters:
        - "@adapter://codex"
        - "@adapter://codex-cli"
        - "@adapter://claude-code"
        - "@adapter://gemini-cli"

    - id: branch:software-engineering.coding-feature-development
      uri: "@branch://software-engineering/coding-feature-development"
      path: branches/software-engineering/coding-feature-development.md
      category: software-engineering
      purpose: "Feature implementation prompt generation with user flow, scope, acceptance criteria, and verification."
      linked_templates:
        - "@template://codeprompt-coach/feature-development"
      linked_checklists:
        - "@checklist://codeprompt-coach/feature"
        - "@checklist://codeprompt-coach/final-review"
      linked_evals:
        - "@eval://software-engineering/coding-feature-development/basic"
        - "@eval://software-engineering/coding-feature-development/missing-acceptance"
        - "@eval://software-engineering/coding-feature-development/scope-creep-risk"
      compatible_adapters:
        - "@adapter://codex"
        - "@adapter://codex-cli"
        - "@adapter://claude-code"
        - "@adapter://gemini-cli"

    - id: branch:software-engineering.test-generation
      uri: "@branch://software-engineering/test-generation"
      path: branches/software-engineering/test-generation.md
      category: software-engineering
      purpose: "Test generation prompt design for runnable behavior-focused tests."
      linked_templates:
        - "@template://codeprompt-coach/test-generation"
      linked_checklists:
        - "@checklist://codeprompt-coach/test-generation"
      linked_evals:
        - "@eval://software-engineering/test-generation/basic"
        - "@eval://software-engineering/test-generation/missing-framework"
        - "@eval://software-engineering/test-generation/surface-tests-risk"

    - id: branch:software-engineering.code-review
      uri: "@branch://software-engineering/code-review"
      path: branches/software-engineering/code-review.md
      category: software-engineering
      purpose: "Code review prompt generation with findings, severity, location, and test gaps."
      linked_templates:
        - "@template://codeprompt-coach/code-review"
      linked_checklists:
        - "@checklist://codeprompt-coach/code-review"

    - id: branch:software-engineering.repository-analysis
      uri: "@branch://software-engineering/repository-analysis"
      path: branches/software-engineering/repository-analysis.md
      category: software-engineering
      purpose: "Read-only repository analysis prompts with evidence and uncertainty."
      linked_checklists:
        - "@checklist://codeprompt-coach/repository-analysis"
      linked_evals:
        - "@eval://software-engineering/repository-analysis/basic"
        - "@eval://software-engineering/repository-analysis/missing-scope"
        - "@eval://software-engineering/repository-analysis/no-edit-boundary"

    - id: branch:software-engineering.algorithm-problem-solving
      uri: "@branch://software-engineering/algorithm-problem-solving"
      path: branches/software-engineering/algorithm-problem-solving.md
      category: software-engineering
      purpose: "Algorithm prompt clarification with input/output, constraints, complexity, edge cases, and tests."
      linked_templates:
        - "@template://codeprompt-coach/coding-agent-task"
      linked_checklists:
        - "@checklist://codeprompt-coach/final-review"

  templates:
    - id: template:codeprompt-coach.coding-agent-task
      uri: "@template://codeprompt-coach/coding-agent-task"
      path: templates.md
      section: "Coding Agent Task Template"
    - id: template:codeprompt-coach.bugfix
      uri: "@template://codeprompt-coach/bugfix"
      path: templates.md
      section: "Bugfix Prompt Template"
    - id: template:codeprompt-coach.feature-development
      uri: "@template://codeprompt-coach/feature-development"
