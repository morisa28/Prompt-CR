lessons:
  - id: lesson.successful-patterns.bugfix-root-cause-minimal-verify.001
    type: successful-pattern
    related_resources:
      - "@branch://software-engineering/bugfix-debugging"
      - "@template://coding-agent/bugfix"
      - "@adapter://codex-cli"
    trigger: "用户要求 coding agent 修复具体失败并保留项目稳定性。"
    failure_mode: "Not a failure; reusable success pattern."
    root_cause: "稳定输出来自三段式约束：先证据定位根因，再最小修复，最后运行原失败命令和相关测试。"
    fix: "复用结构：读取日志和配置；复现失败；根因分析；最小 patch；验证命令；变更摘要和剩余风险。"
    update_targets:
      - templates.md
      - examples.md
      - adapters/codex-cli.md
    severity: low
    status: active

  - id: lesson.successful-patterns.rag-citation-permission.001
    type: successful-pattern
    related_resources:
      - "@branch://ai-systems/knowledge-base-rag"
      - "@safety://privacy-boundary"
      - "@eval://ai-systems/knowledge-base-rag/permission-control"
    trigger: "内部知识库问答要求引用和部门权限。"
    failure_mode: "Not a failure; reusable success pattern."
    root_cause: "RAG prompt 明确了知识源、metadata、权限字段、检索前后过滤、引用格式和权限泄露测试。"
    fix: "复用结构：source index、chunk metadata、retrieval/rerank、citation、permission filters、audit logs、eval questions。"
    update_targets:
      - branches/ai-systems/knowledge-base-rag.md
      - metadata/resources.yaml
      - evals/features/rag-citation-and-permission.feature
    severity: low
    status: active

  - id: lesson.successful-patterns.repository-analysis-read-only.001
    type: successful-pattern
    related_resources:
      - "@branch://software-engineering/repository-analysis"
      - "@template://repository-analysis/read-only"
      - "@checklist://repository-analysis"
    trigger: "用户要求分析仓库结构、风险和改进建议，且不要改代码。"
    failure_mode: "Not a failure; reusable success pattern."
    root_cause: "prompt 把 read-only 边界、文件证据、未读取区域和建议报告分开。"
    fix: "要求先读 README/配置/入口；输出文件树、模块、数据流、风险和建议；禁止修改文件。"
    update_targets:
      - branches/software-engineering/repository-analysis.md
      - examples.md
      - evals/features/natural-language-entry.feature
    severity: low
    status: active

  - id: lesson.successful-patterns.high-risk-safe-summary.001
    type: successful-pattern
    related_resources:
      - "@safety://medical-boundary"
      - "@safety://legal-boundary"
      - "@safety://financial-boundary"
      - "@checklist://high-risk-domain"
    trigger: "用户在高风险领域要求最终判断或行动建议。"
    failure_mode: "Not a failure; reusable success pattern."
    root_cause: "安全输出把越界判断改写为信息整理、风险清单、材料缺口和专业复核问题。"
    fix: "保留用户目标中的安全部分；拒绝诊断、最终法律结论、买卖指令；输出结构化摘要、风险和下一步专业咨询问题。"
    update_targets:
      - safety/README.md
      - router.md
      - examples.md
    severity: low
    status: active
